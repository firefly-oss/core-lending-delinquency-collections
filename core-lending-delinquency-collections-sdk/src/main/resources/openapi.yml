components:
  schemas:
    CollectionCaseDTO:
      required:
      - caseOpenedAt
      - collectionStatus
      - daysPastDue
      - delinquencyStage
      - loanServicingCaseId
      - totalDue
      type: object
      properties:
        collectionCaseId:
          type: string
          format: uuid
          readOnly: true
        loanServicingCaseId:
          type: string
          format: uuid
        collectionStatus:
          type: string
          enum:
          - OPEN
          - CLOSED
          - LEGAL
          - RESTRUCTURED
          - SETTLED
        daysPastDue:
          minimum: 0
          type: integer
          format: int32
        delinquencyStage:
          type: string
          enum:
          - EARLY
          - MID
          - LATE
          - LEGAL
          - WRITE_OFF
        totalDue:
          minimum: 0.0
          exclusiveMinimum: true
          type: number
        totalRecovered:
          minimum: 0.0
          exclusiveMinimum: false
          type: number
        caseOpenedAt:
          type: string
          format: date-time
        caseClosedAt:
          type: string
          format: date-time
        remarks:
          maxLength: 1000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CollectionStatusHistoryDTO:
      required:
      - changedAt
      - changedBy
      - collectionCaseId
      - newStatus
      - reasonCode
      type: object
      properties:
        collectionStatusHistoryId:
          type: string
          format: uuid
          readOnly: true
        collectionCaseId:
          type: string
          format: uuid
        oldStatus:
          type: string
          enum:
          - OPEN
          - CLOSED
          - LEGAL
          - RESTRUCTURED
          - SETTLED
        newStatus:
          type: string
          enum:
          - OPEN
          - CLOSED
          - LEGAL
          - RESTRUCTURED
          - SETTLED
        reasonCode:
          type: string
          enum:
          - PROMISE_BROKEN
          - LEGAL_REFERRAL
          - PAYMENT_RECEIVED
          - NO_CONTACT
        changedAt:
          type: string
          format: date-time
        changedBy:
          maxLength: 255
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CollectionPromiseDTO:
      required:
      - collectionCaseId
      - promisedAmount
      - promisedDate
      type: object
      properties:
        collectionPromiseId:
          type: string
          format: uuid
          readOnly: true
        collectionCaseId:
          type: string
          format: uuid
        promisedDate:
          type: string
          format: date-time
        promisedAmount:
          minimum: 0.01
          exclusiveMinimum: false
          type: number
        actualPaidDate:
          type: string
          format: date-time
        actualPaidAmount:
          minimum: 0.0
          exclusiveMinimum: false
          type: number
        isKept:
          type: boolean
        note:
          maxLength: 1000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CollectionEscalationDTO:
      required:
      - collectionCaseId
      - escalationDate
      - escalationLevel
      - escalationReason
      type: object
      properties:
        collectionEscalationId:
          type: string
          format: uuid
          readOnly: true
        collectionCaseId:
          type: string
          format: uuid
        escalationLevel:
          type: string
          enum:
          - LEVEL_1
          - LEVEL_2
          - LEVEL_3
          - LEGAL
          - EXTERNAL
        escalationReason:
          type: string
          enum:
          - BROKEN_PROMISE
          - NO_CONTACT
          - HIGH_AMOUNT
          - FRAUD_SUSPECT
        escalationDate:
          type: string
          format: date-time
        notes:
          maxLength: 2000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CollectionActionDTO:
      required:
      - actionDate
      - actionType
      - collectionCaseId
      - outcome
      type: object
      properties:
        collectionActionId:
          type: string
          format: uuid
          readOnly: true
        collectionCaseId:
          type: string
          format: uuid
        actionType:
          type: string
          enum:
          - PHONE_CALL
          - SMS
          - EMAIL
          - VISIT
          - LEGAL_NOTICE
          - DEMAND_LETTER
        actionDate:
          type: string
          format: date-time
        outcome:
          type: string
          enum:
          - NO_ANSWER
          - PROMISE_TO_PAY
          - PAID_PARTIAL
          - REFUSED
          - DISPUTED
        notes:
          maxLength: 2000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FilterOptions:
      type: object
      properties:
        caseInsensitiveStrings:
          type: boolean
        includeInheritedFields:
          type: boolean
      description: Filter options for customizing filter behavior
    FilterRequestCollectionCaseDTO:
      required:
      - pagination
      type: object
      properties:
        filters:
          $ref: "#/components/schemas/CollectionCaseDTO"
        rangeFilters:
